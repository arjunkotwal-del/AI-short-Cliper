<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic Shorts Dashboard</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Agentic Pipeline</h1>
            <p>Live Execution Dashboard</p>
        </header>

        <section class="prompt-section glass flex-column">
            <div class="input-row">
                <input type="text" id="prompt-input" placeholder="e.g. clip the funniest moments of https://youtube.com/...">
                <button id="run-btn">Run Agents</button>
                <button id="stop-btn" class="stop-btn" style="display: none;">Stop Pipeline</button>
            </div>
            <div class="options-row">
                <div class="option-field">
                    <label for="num-clips-input">Clips Count:</label>
                    <input type="number" id="num-clips-input" value="3" min="1" max="10">
                </div>
                <div class="option-field">
                    <label for="min-dur-input">Min Duration (s):</label>
                    <input type="number" id="min-dur-input" value="10" min="5" max="120">
                </div>
                <div class="option-field">
                    <label for="max-dur-input">Max Duration (s):</label>
                    <input type="number" id="max-dur-input" value="60" min="10" max="300">
                </div>
                <div class="option-field checkbox-field">
                    <input type="checkbox" id="voiceover-input">
                    <label for="voiceover-input">Enable TTS Voiceover</label>
                </div>
            </div>
        </section>

        <section class="agents-grid">
            <div class="agent-card glass" id="card-orchestrator">
                <div class="status-indicator"></div>
                <h2>Orchestrator</h2>
                <p>Delegates tasks and manages workflow</p>
            </div>
            
            <div class="agent-card glass" id="card-downloader">
                <div class="status-indicator"></div>
                <h2>Downloader</h2>
                <p>Fetches media from YouTube</p>
            </div>

            <div class="agent-card glass" id="card-transcriber">
                <div class="status-indicator"></div>
                <h2>Transcriber</h2>
                <p>Generates Whisper transcripts</p>
            </div>

            <div class="agent-card glass" id="card-clipper">
                <div class="status-indicator"></div>
                <h2>Clipper</h2>
                <p>Finds highlights and renders edits</p>
            </div>
        </section>

        <section class="terminal glass">
            <div class="terminal-header">
                <span class="dot red"></span>
                <span class="dot yellow"></span>
                <span class="dot green"></span>
                <span class="title">Live Stream</span>
            </div>
            <div class="terminal-body" id="log-output">
                <div class="log-line">Waiting for tasks to begin...</div>
            </div>
        </section>
    </div>

    <script src="/app.js"></script>
</body>
</html>
